name: Bug Report
description: Report a problem with Net Worth Navigator
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can so we can reproduce and fix it quickly.

  - type: dropdown
    id: operating-system
    attributes:
      label: Operating System
      description: What OS are you running Net Worth Navigator on?
      options:
        - Windows 10
        - Windows 11
        - macOS
        - Linux (Debian / Ubuntu)
        - Linux (Fedora)
        - Linux (Arch)
        - Linux (other)
        - Other
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: What does `python --version` (or `python3 --version`) show?
      placeholder: e.g. Python 3.12.4
    validations:
      required: true

  - type: dropdown
    id: data-source
    attributes:
      label: Data Source Mode
      description: Which data source is the scenario using?
      options:
        - Manual Entry (synthetic)
        - Monarch Money (live sync)
        - CSV Import
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: bundled-scenario
    attributes:
      label: Does the bug occur with a bundled sample scenario?
      description: If you can reproduce the bug using one of the sample scenarios (Sample Plan, Sample Couples, Sample A, Sample B), let us know which one. That makes it much easier to debug.
      options:
        - I haven't tried with a sample
        - Sample Plan (Single-Person)
        - Sample Couples Plan
        - Sample A
        - Sample B
        - Not applicable (e.g. setup/install issue)

  - type: textarea
    id: config-attachment
    attributes:
      label: Scenario Config (Optional — Only If Relevant)
      description: |
        If the bug is specific to your custom scenario and you're comfortable sharing,
        sanitize your config file first (replace real names with "Alex"/"Sam", round dollar
        amounts, remove anything identifying), then paste it below.
      placeholder: |
        # Paste sanitized TOML here, or leave blank.
        # Include only the section(s) relevant to the bug.

  - type: textarea
    id: what-happened
    attributes:
      label: Describe the Bug
      description: What did you expect to happen, and what actually happened?
      placeholder: Tell us what you see.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the bug?
      placeholder: |
        1. Open the Setup Panel at ...
        2. Select scenario ...
        3. Click ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error Output
      description: Paste the full error message — don't paraphrase. If there's a traceback, include it all.
      render: text
      placeholder: |
        If you saw an error in the terminal or browser console, paste it here.

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots of the Setup Panel's data source status or the error.
      placeholder: Drag and drop images here or paste a link.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Anything else that might help? Browser version, recent changes, frequency of the bug, etc.
      placeholder: Anything else?
