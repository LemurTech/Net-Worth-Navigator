name: Feature Request
description: Suggest an idea for Net Worth Navigator
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem you're trying to solve, not just the feature you want.

  - type: textarea
    id: problem
    attributes:
      label: What Problem Are You Solving?
      description: A clear description of what's not working well or what's missing.
      placeholder: |
        I'm trying to ... but the current approach requires me to ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the Solution
      description: What would you like to see happen?
      placeholder: |
        It would be great if I could ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives You've Considered
      description: Any workarounds or alternative approaches you've tried?
      placeholder: |
        I tried doing ... but that doesn't work because ...

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: What part of the project does this affect?
      options:
        - Simulation engine (model.py)
        - Charts / visual output
        - Web UI (Setup Panel, config editor)
        - Data sources (Manual, Monarch, CSV)
        - Tax modeling
        - Documentation / README
        - Installation / setup
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, config snippets, or links to related discussions.
      placeholder: Anything else?
