name: Deploy demo and User Guide to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/guide/package-lock.json

      - name: Install Node.js dependencies (Starlight guide)
        working-directory: docs/guide
        run: npm ci

      - name: Validate Python source (no syntax warnings)
        run: python -W error::SyntaxWarning -m compileall src/ scripts/

      - name: Build demo (sample scenarios + Starlight guide)
        run: python scripts/build_demo.py
        env:
          NWN_DEPLOY_DIR: output/deploy

      - name: Assemble artifact (demo + Starlight guide)
        run: cp -r docs/guide/dist/* output/demo/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/demo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
