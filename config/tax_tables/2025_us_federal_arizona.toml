# ── Arizona State Income Tax ────────────────────────────────────────────────
# Source: Arizona Department of Revenue
# Arizona adopted a flat 2.50% personal income tax rate starting 2023 (HB 2894).
# Social Security income is NOT taxed at the state level.

[taxes.state]
enabled = true
name = "arizona"
tax_social_security = false

[taxes.state.standard_deduction]
single = 14600
married_joint = 29200
head_of_household = 21900

# Flat 2.50% rate — all filing statuses (terminal bracket only = single rate)
[[taxes.state.brackets.single]]
rate = 0.0250

[[taxes.state.brackets.married_joint]]
rate = 0.0250

[[taxes.state.brackets.head_of_household]]
rate = 0.0250
