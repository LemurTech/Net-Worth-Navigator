# ── Pennsylvania State Income Tax ────────────────────────────────────────────
# PA has a flat 3.07% tax on taxable income. The standard deduction does not
# apply at the state level (PA uses a fixed-dollar exemption instead, which
# is $0 in the simplified model). Social Security income is not taxed.
# Source: PA Department of Revenue — https://www.revenue.pa.gov/

[taxes.state]
enabled = true
name = "pennsylvania"
tax_social_security = false

[taxes.state.standard_deduction]
single = 0
married_joint = 0
head_of_household = 0

# Flat 3.07% — single terminal bracket
[[taxes.state.brackets.single]]
rate = 0.0307

[[taxes.state.brackets.married_joint]]
rate = 0.0307

[[taxes.state.brackets.head_of_household]]
rate = 0.0307
