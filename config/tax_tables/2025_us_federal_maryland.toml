rate = 0.24

[[taxes.brackets.single]]
up_to = 250525
rate = 0.32

[[taxes.brackets.single]]
up_to = 626350
rate = 0.35

[[taxes.brackets.single]]
rate = 0.37

[[taxes.brackets.married_joint]]
