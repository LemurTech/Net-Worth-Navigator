# ── Maryland State Income Tax ──────────────────────────────────────────────
# Source: see docs/references/state-tax-data-sources.md
# MD has county-level income tax (1.75%-3.2%) NOT modeled — state brackets only. Consider adding county rate as a configurable add-on if needed. Std deduction is state-specific.

[taxes.state]
enabled = true
name = "maryland"
tax_social_security = false

[taxes.state.standard_deduction]
