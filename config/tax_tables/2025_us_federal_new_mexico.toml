# ── New Mexico State Income Tax ──────────────────────────────────────────────
# Source: NM Taxation & Revenue Department — https://www.tax.newmexico.gov/
# Progressive brackets: 1.7%, 3.2%, 4.7%, 4.9%, 5.9%
# Standard deduction follows federal amounts.
# Social Security income is NOT taxed at the state level.
# NOTE: NM indexed its brackets for 2025. Verify against the official
# NM rate schedule before relying on exact figures.

[taxes.state]
enabled = true
name = "new mexico"
tax_social_security = false

[taxes.state.standard_deduction]
single = 15000
married_joint = 30000
