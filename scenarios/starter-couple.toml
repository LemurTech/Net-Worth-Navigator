# Net Worth Navigator — Couples Starter Template
#
# Use this file as your starting point for a two-person household
# if you do not use Monarch Money, or if you want to enter your
# balances manually.
#
# For single-person households, use starter.toml instead.
#
# HOW TO USE THIS FILE
# ──────────────────────────────────────────────────────────────────────
# 1. Copy this file to a new scenario:
#       Linux/macOS:  cp scenarios/starter.toml scenarios/myhousehold.toml
#       Windows:      copy scenarios\starter.toml scenarios\myhousehold.toml
#
# 2. Open your copy and replace every value marked  ← YOUR VALUE  with
#    your real household data.
#
# 3. Update [scenario].name and [scenario].slug to something meaningful
#    (e.g.  name = "Smith Household"  /  slug = "smith").
#
# 4. Run the projection:
#       Linux/macOS:  .venv/bin/python run.py --scenario <slug>
#       Windows:      .venv\Scripts\python.exe run.py --scenario <slug>
#
# 5. Optionally edit via the web UI at /finances/config/setup and use
#    the "Synthetic Setup" tab to manage your starting balances.
#
# WHAT "synthetic" MODE MEANS
# ──────────────────────────────────────────────────────────────────────
# Setting  [data_source].mode = "synthetic"  tells the model to read
# starting balances from [synthetic_start] below instead of from
# Monarch Money.  No Monarch account or API key is required.
# You maintain your balances manually (e.g. once a year).
#
# LIABILITIES
# ──────────────────────────────────────────────────────────────────────
# Each loan needs TWO entries:
#   1. A [[liabilities]] block with the amortization parameters.
#   2. A matching key in [synthetic_start.liability_balances] with the
#      current outstanding balance.
# The name must match exactly between both places.
#
# ═══════════════════════════════════════════════════════════════════════


# ─── Scenario Metadata ─────────────────────────────────────────────────

[scenario]
name        = "My Couple Household"
slug        = "starter-couple"
description = "Couples starter template — replace with a brief description."
is_default  = false                    # set true once this is your primary scenario
is_template = true                     # hides from projection shell dropdown


# ─── Data Source ───────────────────────────────────────────────────────

[data_source]
mode = "synthetic"   # synthetic | monarch   (leave as "synthetic" if not using Monarch)


# ─── Starting Balances ─────────────────────────────────────────────────
#
# Enter your approximate current account balances.
# All amounts are in today's dollars.

[synthetic_start]
taxable  = 0        # ← YOUR VALUE: taxable brokerage (stocks, funds, etc.)
trad_ira = 0        # ← YOUR VALUE: traditional 401(k) + traditional IRA total
roth     = 0        # ← YOUR VALUE: Roth 401(k) + Roth IRA total
cash     = 0        # ← YOUR VALUE: checking + savings + money market

# Optional: explicit cost-basis seeds for tax calculations.
# If omitted, the model defaults to 50% taxable cost basis and 100% Roth contribution basis.
# taxable_cost_basis         = 0   # ← YOUR VALUE (optional)
# roth_contribution_basis    = 0   # ← YOUR VALUE (optional)

# Non-investable assets
home_value = 0      # ← YOUR VALUE: estimated current market value of your primary home
vehicles   = 0      # ← YOUR VALUE: current value of vehicles (optional, informational)
other      = 0      # other non-investable assets (optional)

# Named property values — required if you have a SellHome event.
# Add one entry per property you plan to model.
[synthetic_start.property_values]
# "Primary Residence" = 0    # ← YOUR VALUE: uncomment and set if modeling a home sale

# Named liability balances — must match [[liabilities]] names exactly.
[synthetic_start.liability_balances]
# "Home Mortgage" = 0    # ← YOUR VALUE: current outstanding mortgage balance
# "Auto Loan"     = 0    # ← YOUR VALUE: current outstanding auto loan balance


# ─── Simulation Controls ───────────────────────────────────────────────

[simulation]
start_year   = 2025       # ← YOUR VALUE: current or next calendar year
end_year     = 2070       # ← YOUR VALUE: typically max(life_expectancy) + a few years
render_modes = ["deterministic", "historical", "monte_carlo"]


# ─── Display ───────────────────────────────────────────────────────────

[display]
projection_title = "My Household Plan"   # ← YOUR VALUE: chart title


# ─── Stochastic Success Rules ──────────────────────────────────────────
# Controls what counts as "failure" in Monte Carlo / historical simulations.
# These defaults work for most households.

[monte_carlo.success]
failure_mode                    = "spending_shortfall"
minimum_spending_funded_ratio   = 1.0
allow_home_equity_for_spending  = false
allow_debt_for_spending         = false
failure_grace_period_months     = 0


# ═══════════════════════════════════════════════════════════════════════
# ─── Household Members ─────────────────────────────────────────════════
# ═══════════════════════════════════════════════════════════════════════

[person1]
name              = "Person 1"          # ← YOUR VALUE
dob               = "1975-01-01"        # ← YOUR VALUE: YYYY-MM-DD
life_expectancy   = 90                  # modeled terminal age (not a prediction)
retirement_year   = 2040                # ← YOUR VALUE: first year wages stop

# Employment income
# annual_take_home is your net cash income after taxes.
# Set annual_take_home_is_net_of_retirement_contributions = true if retirement
# contributions are already deducted from this number (most payroll scenarios).
annual_take_home  = 0                   # ← YOUR VALUE: annual net take-home pay
annual_take_home_is_net_of_retirement_contributions = true
annual_take_home_real_raise = 0.01      # real raise above inflation (~1% is a safe default)

# Retirement contributions (percentage-of-gross method)
# The model multiplies gross_income × retirement_contribution_percent each year.
contribution_method                      = "percent_of_gross"
gross_income                             = 0      # ← YOUR VALUE: gross annual salary
gross_income_annual_increase_percent     = 0.03
retirement_contribution_percent          = 0.10   # ← YOUR VALUE: e.g. 0.10 = 10% of gross
retirement_contribution_annual_increase_percent = 0.00
retirement_contribution_max_percent      = 0.25

# Employer match (optional — comment out if no employer match)
# annual_401k_employer_match_mode        = "percent_of_gross"
# annual_401k_employer_match_rate        = 0.50   # 50% match on each dollar contributed
# annual_401k_employer_match_max_percent = 0.06

# Social Security
ss_start_age = 67           # ← YOUR VALUE: age to claim Social Security (62–70)
rmd_trad_ira_share = 0.5    # ← YOUR VALUE: this person's share of household traditional balance

# Traditional / Roth split for 401(k) contributions (must sum to 1.0)
[person1.annual_401k_contribution_split]
trad_ira = 0.70   # ← YOUR VALUE: fraction routed to traditional
roth     = 0.30   # ← YOUR VALUE: fraction routed to Roth

# Social Security benefit by claim age (get your estimate at ssa.gov/myaccount)
[person1.social_security_benefits]
67 = 0   # ← YOUR VALUE: estimated monthly benefit at your claim age


# ─── Person 2 ──────────────────────────────────────────────────────────
# NOTE: [person2] is currently REQUIRED — the simulation engine does not
# yet support single-person households (deleting this section will crash
# the projection with a missing-config error). If you're modeling a
# single person today, keep this section but zero out its income/balance
# fields as a workaround. True single-person support is tracked as a
# feature gap, not yet implemented.

[person2]
name              = "Person 2"          # ← YOUR VALUE
dob               = "1978-01-01"        # ← YOUR VALUE: YYYY-MM-DD
life_expectancy   = 90
retirement_year   = 2043                # ← YOUR VALUE

annual_take_home  = 0                   # ← YOUR VALUE
annual_take_home_is_net_of_retirement_contributions = true
annual_take_home_real_raise = 0.01

contribution_method                      = "percent_of_gross"
gross_income                             = 0      # ← YOUR VALUE
gross_income_annual_increase_percent     = 0.03
retirement_contribution_percent          = 0.10   # ← YOUR VALUE
retirement_contribution_annual_increase_percent = 0.00
retirement_contribution_max_percent      = 0.25

# annual_401k_employer_match_mode        = "percent_of_gross"
# annual_401k_employer_match_rate        = 0.50
# annual_401k_employer_match_max_percent = 0.06

ss_start_age       = 67   # ← YOUR VALUE
rmd_trad_ira_share = 0.5

[person2.annual_401k_contribution_split]
trad_ira = 0.70
roth     = 0.30

[person2.social_security_benefits]
67 = 0   # ← YOUR VALUE: estimated monthly benefit


# ═══════════════════════════════════════════════════════════════════════
# ─── Spending ──────────────────────────────────────────────────────────
# ═══════════════════════════════════════════════════════════════════════

[spending]
retirement_annual              = 0       # ← YOUR VALUE: combined annual spending in retirement
survivor_percent_of_retirement = 0.70    # surviving spouse spends ~70% of joint spending
debt_service_handling          = "auto_reduce"  # frees loan P&I from spending target at payoff


# ═══════════════════════════════════════════════════════════════════════
# ─── Withdrawal Policy ─────────────────────────────────────────────────
# ═══════════════════════════════════════════════════════════════════════

[withdrawal_policy]
# Cash reserve targets — how much cash to keep on hand in each life phase
accumulation_cash_target = 20000   # ← YOUR VALUE: ~3-6 months essential expenses
retirement_cash_target   = 30000   # ← YOUR VALUE: ~6-12 months
survivor_cash_target     = 20000   # ← YOUR VALUE: ~6 months for one person

# Withdrawal order — which buckets to draw from first when spending exceeds income
# Options: cash_above_target, taxable, trad_ira, roth, cash_below_target
accumulation_withdrawal_order = ["cash_above_target", "taxable", "roth", "trad_ira", "cash_below_target"]
retirement_withdrawal_order   = ["cash_above_target", "trad_ira", "taxable", "roth", "cash_below_target"]
survivor_withdrawal_order     = ["cash_above_target", "trad_ira", "taxable", "roth", "cash_below_target"]

# Surplus routing — where to put extra money after expenses are covered
accumulation_surplus_order = ["roth", "taxable"]
retirement_surplus_order   = ["roth", "taxable"]
survivor_surplus_order     = ["roth", "taxable"]


# ═══════════════════════════════════════════════════════════════════════
# ─── Assumptions ───────────────────────────────────────────────────────
# ═══════════════════════════════════════════════════════════════════════

[assumptions]
stock_return              = 0.07    # annual nominal stock return (e.g. 0.07 = 7%)
bond_return               = 0.04    # annual nominal bond return
inflation                 = 0.03    # annual inflation rate
equity_allocation         = 0.70    # fraction of portfolio in equities (rest in bonds)
effective_tax_rate_pre_retirement  = 0.22  # ← YOUR VALUE: rough combined effective rate
effective_tax_rate_post_retirement = 0.15  # ← YOUR VALUE: typically lower in retirement


# ═══════════════════════════════════════════════════════════════════════
# ─── Liabilities (Loans) ───────────────────────────────────────────────
# ═══════════════════════════════════════════════════════════════════════
#
# Uncomment and fill in one [[liabilities]] block per loan.
# The name MUST match the key in [synthetic_start.liability_balances] exactly.

# [[liabilities]]
# name           = "Home Mortgage"  # ← must match synthetic_start.liability_balances key
# annual_rate    = 0.0675           # ← YOUR VALUE: e.g. 0.0675 = 6.75%
# monthly_base   = 1500             # ← YOUR VALUE: contractual P&I payment (no extra)
# monthly_escrow = 400              # ← YOUR VALUE: property tax + insurance (0 if none)
# monthly_extra  = 0                # extra voluntary principal payment (optional)
# type           = "mortgage"

# [[liabilities]]
# name           = "Auto Loan"      # ← must match synthetic_start.liability_balances key
# annual_rate    = 0.059            # ← YOUR VALUE
# monthly_base   = 400              # ← YOUR VALUE
# monthly_escrow = 0
# monthly_extra  = 0
# type           = "auto"


# ═══════════════════════════════════════════════════════════════════════
# ─── Events ────────────────────────────────────────────────────────────
# ═══════════════════════════════════════════════════════════════════════
#
# Retirement, Social Security, and EndOfPlan events are synthesized
# automatically from each person's retirement_year, ss_start_age, dob,
# and life_expectancy — no need to add them manually.
#
# Add your own events below.  Every event can be toggled on/off with
# enabled = true/false without deleting the entry.
#
# Common event types:
#   Expense      — one-time or recurring cash outflow
#   Income       — one-time or recurring cash inflow
#   SellHome     — convert a property to cash (net of fees and mortgage)
#   SpendingShift — change retirement spending from a given year
#   CareerBreak  — zero out a person's income for a period

# Example: large one-time expense (home repair, medical, travel, etc.)
# [[events]]
# enabled = true
# type    = "Expense"
# label   = "Home Repair"
# year    = 2028
# amount  = -15000
# funding = "cash_reserve_first"   # draws from cash before retirement buckets

# Example: recurring discretionary expense every other year
# [[events]]
# enabled = true
# type               = "Expense"
# label              = "Vacation"
# year               = 2027
# amount             = -5000
# repeat_every_years = 2
# repeat_count       = 10
# chart_first_occurrence_only = true

# Example: home sale
# [[events]]
# enabled  = true
# type     = "SellHome"
# label    = "Sell Primary Residence"
# year     = 2045
# property = "Primary Residence"   # must match [synthetic_start.property_values] key
