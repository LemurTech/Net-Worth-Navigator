# Net Worth Navigator — Sample B: Optimistic Plan
#
# Household: Alex (b. 1969) and Sam (b. 1974). Same starting balances as
# Sample A — the two scenarios are the same household making DIFFERENT choices.
# Compare these scenarios to see how retirement timing, spending, and strategy
# affect long-term outcomes.
#
# Sample B profile — "Early and ambitious":
#   • Retire earlier (Alex at 65, Sam at 64) — 4-6 years ahead of Sample A
#   • Higher retirement spending ($96K/yr — $16K more than A)
#   • Social Security delayed to 70 for maximum monthly benefit
#   • Roth-heavy contributions (25% trad / 75% Roth) for tax-free retirement income
#   • Growth-tilted 78% equity allocation
#   • Aggressive extra mortgage payments to eliminate debt before retirement
#   • More travel and a home renovation shortly after early retirement
#
# Key question: Does earlier retirement + higher spending succeed because of
# higher returns + SS delay + Roth flexibility, or does Sample A's longer
# career ultimately produce a stronger outcome?

[scenario]
name        = "Sample B Plan"
slug        = "sample-b"
description = "Optimistic: early retirement, higher spending, SS at 70, Roth-heavy contributions."
is_default  = false

[data_source]
mode = "synthetic"

# ─── Starting Balances ────────────────────────────────────────────────────────
# Identical to Sample A — this is the same household at the same point in time.

[synthetic_start]
taxable  = 125000
trad_ira = 350000
roth     = 110000
cash     = 45000
home_value = 520000
vehicles   = 0
other      = 0

[synthetic_start.property_values]
"Sample Residence" = 520000

[synthetic_start.liability_balances]
"Sample Mortgage" = 265000

# ─── Simulation ───────────────────────────────────────────────────────────────

[simulation]
start_year  = 2026
end_year    = 2066
render_modes = ["deterministic", "historical", "monte_carlo"]
mode         = "deterministic"
num_runs     = 250
seed         = 42
portfolio_return_volatility = 0.17   # Slightly higher vol: growth-tilted portfolio
real_dollar_basis = true      # show all values in start-year purchasing power

[display]
projection_title = "Sample B — Optimistic Plan (Synthetic Demo)"

[monte_carlo.success]
failure_mode                    = "spending_shortfall"
minimum_spending_funded_ratio   = 1.0
allow_home_equity_for_spending  = false
allow_debt_for_spending         = false
failure_grace_period_months     = 6   # One difficult year is not failure

# ═══════════════════════════════════════════════════════════════════════════════
# ─── Household Members ─────────────────────────────────────────────────────────
# ═══════════════════════════════════════════════════════════════════════════════

[person1]
name             = "Alex"
dob              = "1969-04-12"
life_expectancy  = 90
retirement_year  = 2034                 # Age 65 — early retirement goal

annual_take_home = 78000
annual_take_home_is_net_of_retirement_contributions = true
annual_take_home_real_raise = 0.015     # Stronger career trajectory assumption

contribution_method                      = "percent_of_gross"
gross_income                             = 110000
gross_income_annual_increase_percent     = 0.05
retirement_contribution_percent          = 0.22   # 22% of gross — saving aggressively for early exit
retirement_contribution_annual_increase_percent = 0.01
retirement_contribution_max_percent      = 0.30

annual_401k_employer_match_mode        = "percent_of_gross"
annual_401k_employer_match_rate        = 1.0
annual_401k_employer_match_max_percent = 0.06

ss_start_age       = 70                 # Delay SS: 8% per-year credit, max monthly benefit
rmd_trad_ira_share = 0.50               # Closer to 50/50: more Roth concentration

[person1.annual_401k_contribution_split]
trad_ira = 0.25   # Roth-heavy: smaller current deduction, larger tax-free balance in retirement
roth     = 0.75

[person1.social_security_benefits]
62 = 1700
63 = 1840
64 = 1990
65 = 2160
66 = 2340
67 = 2520
68 = 2710
69 = 2910
70 = 3120


[person2]
name             = "Sam"
dob              = "1974-10-03"
life_expectancy  = 92
retirement_year  = 2038                 # Age 64 — retires close to Alex

annual_take_home = 52000
annual_take_home_is_net_of_retirement_contributions = true
annual_take_home_real_raise = 0.010     # Stronger than Sample A

contribution_method                      = "percent_of_gross"
gross_income                             = 65000
gross_income_annual_increase_percent     = 0.045
retirement_contribution_percent          = 0.15   # Higher contribution rate than Sample A
retirement_contribution_annual_increase_percent = 0.01
retirement_contribution_max_percent      = 0.25

annual_401k_employer_match_mode        = "percent_of_gross"
annual_401k_employer_match_rate        = 1.0
annual_401k_employer_match_max_percent = 0.06

ss_start_age       = 70                 # Both delay SS
rmd_trad_ira_share = 0.50

[person2.annual_401k_contribution_split]
trad_ira = 0.25
roth     = 0.75

[person2.social_security_benefits]
62 = 1100
63 = 1180
64 = 1270
65 = 1370
66 = 1480
67 = 1600
68 = 1730
69 = 1860
70 = 2010

# ═══════════════════════════════════════════════════════════════════════════════
# ─── Spending, Withdrawal, and Assumptions ─────────────────────────────────────
# ═══════════════════════════════════════════════════════════════════════════════

[spending]
retirement_annual              = 96000   # Higher lifestyle: $16K/yr more than Sample A
survivor_percent_of_retirement = 0.70
debt_service_handling          = "auto_reduce"
spending_basis                 = "real"

[withdrawal_policy]
accumulation_cash_target = 50000
retirement_cash_target   = 90000
survivor_cash_target     = 65000

# Taxable-first in retirement: preserve Roth for later, let taxable gains realize
accumulation_withdrawal_order = ["cash_above_target", "taxable", "roth", "trad_ira", "cash_below_target"]
retirement_withdrawal_order   = ["cash_above_target", "taxable", "roth", "trad_ira", "cash_below_target"]
survivor_withdrawal_order     = ["cash_above_target", "taxable", "roth", "trad_ira", "cash_below_target"]

accumulation_surplus_order = ["roth", "taxable"]   # Prioritize Roth fill while working
retirement_surplus_order   = ["roth", "taxable"]
survivor_surplus_order     = ["roth", "taxable"]

[assumptions]
stock_return             = 0.080         # Optimistic long-run equity return assumption
bond_return              = 0.045
inflation                = 0.030
cash_return              = 0.030
real_estate_appreciation = 0.035
equity_allocation        = 0.78          # Growth-tilted: 78% equity vs A's 70%
real_estate_sale_fee_rate = 0.06

effective_tax_rate_pre_retirement  = 0.22
effective_tax_rate_post_retirement = 0.13  # Lower: large Roth base reduces taxable withdrawals

taxable_withdrawal_taxable_fraction   = 0.45   # More basis in taxable account: Roth-spill
trad_ira_withdrawal_taxable_fraction  = 1.00

[taxes]
enabled = true
table_set = "2025_us_federal_oregon"
pre_retirement_filing_status = "married_joint"
retirement_filing_status     = "married_joint"
survivor_filing_status       = "single"
wage_tax_treatment           = "net_cash"

[taxes.rmd]
enabled   = true
start_age = 73

# ═══════════════════════════════════════════════════════════════════════════════
# ─── Liabilities ───────────────────────────────────────────────────────────────
# ═══════════════════════════════════════════════════════════════════════════════

[[liabilities]]
name           = "Sample Mortgage"
annual_rate    = 0.0575
monthly_base   = 2100
monthly_escrow = 450               # Property tax + insurance
monthly_extra  = 500               # Aggressive paydown — goal: paid off before retirement
type           = "mortgage"

# ═══════════════════════════════════════════════════════════════════════════════
# ─── Events ────────────────────────────────────────────────────────────────────
# ═══════════════════════════════════════════════════════════════════════════════

