# Net Worth Navigator — Shareable Sample Scenario
# This scenario is safe for demos: it uses synthetic starting balances,
# not live Monarch data and not Monarch cache data.

[scenario]
name = "Sample Plan"
slug = "sample"
description = "Share-safe synthetic scenario for demos and walkthroughs."
is_default = false

[data_source]
mode = "synthetic"   # synthetic | monarch

[synthetic_start]
# Starting investable balances (synthetic)
taxable = 120000
trad_ira = 380000
roth = 95000
cash = 45000
# Optional explicit basis seeds for synthetic scenarios:
# taxable_cost_basis = 84000
# roth_contribution_basis = 70000

# Starting non-investable balances (synthetic)
home_value = 520000

# Optional synthetic rollups
vehicles = 0
other = 0

# Optional named property balances for SellHome/property tracking
[synthetic_start.property_values]
"Sample Residence" = 520000

# Optional named liability balances (must match [[liabilities]].name if used)
[synthetic_start.liability_balances]
"Sample Mortgage" = 265000

[simulation]
start_year = 2026
end_year = 2066

[display]
projection_title = "Sample Household Plan (Synthetic Demo)"

render_modes = ["deterministic", "historical", "monte_carlo"]   # shell/render pipeline outputs these mode variants
mode = "deterministic"   # compatibility/default single-run mode; per-mode renders override this automatically
# num_runs = 250
# seed = 12345
# portfolio_return_volatility = 0.15   # annual stdev for blended investable return in Monte Carlo mode
# historical_returns_path = "config/return_sequences/us_balanced_returns.csv"  # bundled illustrative starter dataset; columns: year, return

[monte_carlo.success]    # success/failure rules for all stochastic modes: monte_carlo and historical
failure_mode = "spending_shortfall"

# Possible values:
# - "net_worth_below_zero"
# - "liquid_depletion"
# - "spending_shortfall"
# - "preserve_home_equity"
# - "custom"

minimum_spending_funded_ratio = 1.0
allow_home_equity_for_spending = false
allow_debt_for_spending = false
failure_grace_period_months = 0

# Additional stochastic risk metrics shown in the UI/sidecars
# (for example Probability of Home Equity Required) are derived
# from these rules and do not require extra TOML fields.

# Optional custom mode controls:
# custom_failure_column = "spending_funded_ratio"
# custom_failure_operator = "<"
# custom_failure_threshold = 1.0

[person1]
name = "Alex"
dob = "1969-04-12"
life_expectancy = 90
retirement_year = 2038
annual_take_home = 78000
annual_take_home_is_net_of_retirement_contributions = true
annual_take_home_real_raise = 0.01
annual_401k_contribution = 22000
annual_401k_contribution_extra_increase = 0.00
annual_ira_contribution = 0
rmd_trad_ira_share = 0.6
ss_start_age = 67

[person1.social_security_benefits]
"62" = 1700
"63" = 1840
"64" = 1990
"65" = 2160
"66" = 2340
"67" = 2520
"68" = 2710
"69" = 2910
"70" = 3120

[person1.annual_401k_contribution_split]
trad_ira = 0.31
roth     = 0.69

[person2]
name = "Sam"
dob = "1974-10-03"
life_expectancy = 92
retirement_year = 2043
annual_take_home = 52000
annual_take_home_is_net_of_retirement_contributions = true
annual_take_home_real_raise = 0.005
annual_401k_contribution = 8000
annual_401k_contribution_extra_increase = 0.00
annual_ira_contribution = 3000
annual_ira_contribution_bucket = "roth"
rmd_trad_ira_share = 0.4
ss_start_age = 67

[person2.social_security_benefits]
"62" = 1100
"63" = 1180
"64" = 1270
"65" = 1370
"66" = 1480
"67" = 1600
"68" = 1730
"69" = 1860
"70" = 2010

[spending]
retirement_annual = 82000
survivor_percent_of_retirement = 0.72
spending_basis = "real"

[withdrawal_policy]
accumulation_cash_target = 45000
retirement_cash_target = 85000
survivor_cash_target = 65000

accumulation_withdrawal_order = ["cash_above_target", "taxable", "roth", "trad_ira", "cash_below_target"]
retirement_withdrawal_order   = ["cash_above_target", "trad_ira", "taxable", "roth", "cash_below_target"]
survivor_withdrawal_order     = ["cash_above_target", "trad_ira", "taxable", "roth", "cash_below_target"]

accumulation_surplus_order = ["taxable", "roth", "trad_ira"]
retirement_surplus_order   = ["taxable", "roth", "trad_ira"]
survivor_surplus_order     = ["taxable", "roth", "trad_ira"]

[assumptions]
stock_return = 0.07
bond_return = 0.04
inflation = 0.03
cash_return = 0.03
real_estate_appreciation = 0.03
equity_allocation = 0.70
real_estate_sale_fee_rate = 0.06

effective_tax_rate_pre_retirement = 0.22
effective_tax_rate_post_retirement = 0.15

taxable_withdrawal_taxable_fraction = 0.50   # legacy fallback only; omitted basis seeds imply 50% starting cost basis
trad_ira_withdrawal_taxable_fraction = 1.00
# Optional account-mechanics defaults:
# initial_taxable_cost_basis_fraction = 0.50
# initial_roth_contribution_basis_fraction = 1.00

[taxes]
enabled = true
table_set = "2025_us_federal_oregon"
pre_retirement_filing_status = "married_joint"
retirement_filing_status = "married_joint"
survivor_filing_status = "single"
wage_tax_treatment = "net_cash"

[taxes.rmd]
enabled = true
start_age = 73

[[liabilities]]
name = "Sample Mortgage"
annual_rate = 0.0575
monthly_base = 2100
monthly_extra = 200
type = "mortgage"

# Core lifecycle anchors
[[events]]
enabled = true
type = "EndOfPlan"
label = "End of Plan (Alex)"
person = "person1"
year = 2059

