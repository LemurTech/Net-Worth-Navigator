# Net Worth Navigator — Sample A: Conservative Plan
#
# Household: Alex (b. 1969) and Sam (b. 1974). Same starting balances as
# Sample B — the two scenarios are the same household making DIFFERENT choices.
# Compare these scenarios to see how retirement timing, spending, and strategy
# affect long-term outcomes.
#
# Sample A profile — "Steady and secure":
#   • Work longer (Alex retires at 69, Sam at 69)
#   • Moderate retirement spending ($80K/yr)
#   • Social Security claimed at 67 (full retirement age)
#   • Traditional-heavy contributions (70% trad / 30% Roth) for current deductions
#   • Standard 70% equity allocation
#   • Modest extra mortgage payments

[scenario]
name        = "Sample A Plan"
slug        = "sample-a"
description = "Conservative: longer careers, lower spending, SS at 67, trad-heavy contributions."
is_default  = false
household_type = "couple"

[data_source]
mode = "synthetic"

# ─── Starting Balances ────────────────────────────────────────────────────────
# Identical to Sample B — this is the same household at the same point in time.

[synthetic_start]
taxable  = 125000
trad_ira = 350000
roth     = 110000
cash     = 45000
home_value = 520000
vehicles   = 0
other      = 0

[synthetic_start.property_values]
"Sample Residence" = 520000

[synthetic_start.liability_balances]
"Sample Mortgage" = 265000

# ─── Simulation ───────────────────────────────────────────────────────────────

[simulation]
start_year  = 2026
end_year    = 2066
render_modes = ["deterministic", "historical", "monte_carlo"]
mode         = "deterministic"
num_runs     = 250
seed         = 42
portfolio_return_volatility = 0.15
value_basis = "nominal"

[display]
projection_title = "Sample A — Conservative Plan (Synthetic Demo)"

[monte_carlo.success]
failure_mode                    = "spending_shortfall"
minimum_spending_funded_ratio   = 1.0
allow_home_equity_for_spending  = false
allow_debt_for_spending         = false
failure_grace_period_months     = 0

# ═══════════════════════════════════════════════════════════════════════════════
# ─── Household Members ─────────────────────────────────────────────────────────
# ═══════════════════════════════════════════════════════════════════════════════

[person1]
name             = "Alex"
dob              = "1969-04-12"
life_expectancy  = 90
retirement_year  = 2038                 # Age 69 — works to near-full career

annual_take_home = 78000
annual_take_home_is_net_of_retirement_contributions = true
annual_take_home_real_raise = 0.01

contribution_method                      = "percent_of_gross"
gross_income                             = 110000
gross_income_annual_increase_percent     = 0.04
retirement_contribution_percent          = 0.18   # 18% of gross
retirement_contribution_annual_increase_percent = 0.00
retirement_contribution_max_percent      = 0.28

annual_401k_employer_match_mode        = "percent_of_gross"
annual_401k_employer_match_rate        = 1.0
annual_401k_employer_match_max_percent = 0.06

ss_start_age       = 67                 # Full retirement age — no delay strategy
rmd_trad_ira_share = 0.60

[person1.annual_401k_contribution_split]
trad_ira = 0.70   # Traditional-heavy: maximize current-year tax deduction
roth     = 0.30

[person1.social_security_benefits]
62 = 1700
63 = 1840
64 = 1990
65 = 2160
66 = 2340
67 = 2520
68 = 2710
69 = 2910
70 = 3120


[person2]
name             = "Sam"
dob              = "1974-10-03"
life_expectancy  = 92
retirement_year  = 2043                 # Age 69 — mirrors Alex's work ethic

annual_take_home = 52000
annual_take_home_is_net_of_retirement_contributions = true
annual_take_home_real_raise = 0.005

contribution_method                      = "percent_of_gross"
gross_income                             = 65000
gross_income_annual_increase_percent     = 0.035
retirement_contribution_percent          = 0.12
retirement_contribution_annual_increase_percent = 0.00
retirement_contribution_max_percent      = 0.22

annual_401k_employer_match_mode        = "percent_of_gross"
annual_401k_employer_match_rate        = 1.0
annual_401k_employer_match_max_percent = 0.06

ss_start_age       = 67
rmd_trad_ira_share = 0.40

[person2.annual_401k_contribution_split]
trad_ira = 0.70
roth     = 0.30

[person2.social_security_benefits]
62 = 1100
63 = 1180
64 = 1270
65 = 1370
66 = 1480
67 = 1600
68 = 1730
69 = 1860
70 = 2010

# ═══════════════════════════════════════════════════════════════════════════════
# ─── Spending, Withdrawal, and Assumptions ─────────────────────────────────────
# ═══════════════════════════════════════════════════════════════════════════════

[spending]
retirement_annual              = 80000   # Moderate spending target
survivor_percent_of_retirement = 0.72
debt_service_handling          = "auto_reduce"
spending_basis                 = "real"

[withdrawal_policy]
accumulation_cash_target = 40000
retirement_cash_target   = 75000
survivor_cash_target     = 55000

accumulation_withdrawal_order = ["cash_above_target", "taxable", "roth", "trad_ira", "cash_below_target"]
retirement_withdrawal_order   = ["cash_above_target", "trad_ira", "taxable", "roth", "cash_below_target"]
survivor_withdrawal_order     = ["cash_above_target", "trad_ira", "taxable", "roth", "cash_below_target"]

accumulation_surplus_order = ["roth", "taxable"]
retirement_surplus_order   = ["roth", "taxable"]
survivor_surplus_order     = ["roth", "taxable"]

[assumptions]
stock_return             = 0.070         # Standard long-run equity return
bond_return              = 0.040
inflation                = 0.030
cash_return              = 0.030
real_estate_appreciation = 0.030
equity_allocation        = 0.70          # Moderate 70/30 allocation
real_estate_sale_fee_rate = 0.06

effective_tax_rate_pre_retirement  = 0.22
effective_tax_rate_post_retirement = 0.15

taxable_withdrawal_taxable_fraction   = 0.50
trad_ira_withdrawal_taxable_fraction  = 1.00

[taxes]
enabled = true
table_set = "2025_us_federal_oregon"
pre_retirement_filing_status = "married_joint"
retirement_filing_status     = "married_joint"
survivor_filing_status       = "single"
wage_tax_treatment           = "net_cash"

[taxes.rmd]
enabled   = true
start_age = 73

# ═══════════════════════════════════════════════════════════════════════════════
# ─── Liabilities ───────────────────────────────────────────────────────────────
# ═══════════════════════════════════════════════════════════════════════════════

[[liabilities]]
name           = "Sample Mortgage"
annual_rate    = 0.0575
monthly_base   = 2100
monthly_escrow = 450               # Property tax + insurance
monthly_extra  = 200               # Modest extra payment
type           = "mortgage"

# ═══════════════════════════════════════════════════════════════════════════════
