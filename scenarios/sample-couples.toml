# Net Worth Navigator — Couples Sample Plan (Reference Documentation)
#
# This file is the canonical versioned reference scenario for couples
# households. It illustrates every available config section, field, and
# event type with inline documentation and realistic synthetic demo values.
# Safe for sharing — uses synthetic starting balances, not live Monarch data.
#
# Household: Alex (person1, b. 1969) and Sam (person2, b. 1974).
# Both work into their 60s, both contribute to 401(k)/IRA via percentage-of-gross
# with employer matches, travel every other year, and carry a mortgage and an
# auto loan.
#
# Scenario files are TOML. Fields can be commented out with #.
# Events can be toggled on/off with enabled = true/false without deleting them.
# All monetary values are in today's USD unless noted.

# ─── Scenario Metadata ─────────────────────────────────────────────────────────

[scenario]
name        = "Sample Couples Plan"
slug        = "sample-couples"
description = "Share-safe couples reference scenario with full inline documentation."
is_default  = false

# ─── Data Source (synthetic → no Monarch call, no cache) ───────────────────────
household_type = "couple"

[data_source]
mode = "synthetic"   # synthetic | monarch

# ─── Synthetic Starting Balances ───────────────────────────────────────────────

[synthetic_start]
# Investable buckets
taxable  = 120000
trad_ira = 380000
roth     = 95000
cash     = 45000
# Optional explicit basis seeds (if omitted, defaults to 50% taxable cost basis,
# 100% Roth contribution basis):
# taxable_cost_basis = 84000
# roth_contribution_basis = 70000

# Non-investable balances
home_value = 620000
vehicles   = 0
other      = 0

# Named property balances for SellHome / property-tracking events
[synthetic_start.property_values]
"Sample Residence" = 620000

# Named liability balances (must match [[liabilities]].name entries)
[synthetic_start.liability_balances]
"Home Mortgage" = 365000
"RAV4 Hybrid Auto Loan" = 28000

# ─── Simulation Controls ───────────────────────────────────────────────────────

[simulation]
start_year  = 2026
end_year    = 2066
render_modes = ["deterministic", "historical", "monte_carlo"]
mode = "deterministic"   # compatibility/default single-run mode
# num_runs = 250                          # Monte Carlo run count (default 250)
# seed = 12345                            # reproducibility seed
# portfolio_return_volatility = 0.15      # annual stdev for blended investable return
# historical_returns_path = "config/return_sequences/us_balanced_returns.csv"

# ─── Display Settings ──────────────────────────────────────────────────────────
value_basis = "both"

[display]
projection_title = "Sample Household Plan (Synthetic Demo)"

# ─── Stochastic Success / Failure Rules ────────────────────────────────────────

[monte_carlo.success]
failure_mode = "spending_shortfall"
# Possible values: "net_worth_below_zero" | "liquid_depletion" |
#   "spending_shortfall" | "preserve_home_equity" | "custom"
minimum_spending_funded_ratio = 1.0
allow_home_equity_for_spending = false
allow_debt_for_spending = false
failure_grace_period_months = 0
# custom_failure_column   = "spending_funded_ratio"
# custom_failure_operator = "<"
# custom_failure_threshold = 1.0

# ═══════════════════════════════════════════════════════════════════════════════
# ─── Household Members ─────────────────────────────────────────────────────────
# ═══════════════════════════════════════════════════════════════════════════════

[person1]
name              = "Alex"
dob               = "1969-04-12"   # YYYY-MM-DD
life_expectancy   = 90             # modeled terminal age (not a prediction)
retirement_year   = 2038           # first year wages stop in the model

# Employment income inputs (annual, nominal dollars)
annual_take_home  = 78000          # net-cash wage input (see [taxes].wage_tax_treatment)
annual_take_home_is_net_of_retirement_contributions = true  # true = do NOT subtract payroll contributions again
annual_take_home_real_raise = 0.01  # real raise above inflation; total growth ~= (1+inflation)*(1+real_raise)-1

# Retirement contributions — percentage of gross income
# When contribution_method = "percent_of_gross", the model computes the
# contribution as gross_income × retirement_contribution_percent, then applies
# annual gross growth and auto-escalation if configured.
contribution_method = "percent_of_gross"
gross_income = 110000                   # gross annual income (used for contribution math only)
gross_income_annual_increase_percent = 0.04   # combined COLA + performance
retirement_contribution_percent = 0.21       # 21% of gross income
retirement_contribution_annual_increase_percent = 0.00  # no auto-escalation
retirement_contribution_max_percent = 0.30     # never exceed 30% of gross

# Employer match
# annual_401k_employer_match = 6513                   # flat annual employer 401(k) match
annual_401k_employer_match_mode = "percent_of_gross"  # "flat" (default) | "percent_of_gross"
annual_401k_employer_match_rate = 1.0                 # e.g. 0.50 = 50% match on each dollar contributed
annual_401k_employer_match_max_percent = 0.06         # e.g. 0.06 = match applies to first 6% of salary

annual_ira_contribution  = 0        # direct IRA contribution (cash outflow + bucket deposit)

# Optional routing override for explicit contribution deposits
# annual_401k_contribution_bucket = "trad_ira"  # valid: trad_ira | roth
# annual_ira_contribution_bucket  = "roth"      # valid: trad_ira | roth

# Share of household traditional retirement balance for RMD math
rmd_trad_ira_share = 0.6

# Social Security timing and benefit options
ss_start_age = 67   # source of truth for SS start timing

[person1.social_security_benefits]
"62" = 1700
"63" = 1840
"64" = 1990
"65" = 2160
"66" = 2340
"67" = 2520
"68" = 2710
"69" = 2910
"70" = 3120

# Optional proportional split for bundled workplace plan (trad + Roth buckets).
# When configured, contributions are divided between trad_ira and roth by ratio.
[person1.annual_401k_contribution_split]
trad_ira = 0.31
roth     = 0.69

# ────────────────────────────────────────────────────────────────────────────────

[person2]
name              = "Sam"
dob               = "1974-10-03"
life_expectancy   = 92
retirement_year   = 2043

annual_take_home  = 52000
annual_take_home_is_net_of_retirement_contributions = true
annual_take_home_real_raise = 0.005

# Retirement contributions — percentage of gross income
contribution_method = "percent_of_gross"
gross_income = 65000
gross_income_annual_increase_percent = 0.035
retirement_contribution_percent = 0.12
retirement_contribution_annual_increase_percent = 0.00
retirement_contribution_max_percent = 0.20

# Employer match
# annual_401k_employer_match = 6513                   # flat annual employer 401(k) match
annual_401k_employer_match_mode = "percent_of_gross"  # "flat" (default) | "percent_of_gross"
annual_401k_employer_match_rate = 1.0                 # e.g. 0.50 = 50% match on each dollar contributed
annual_401k_employer_match_max_percent = 0.06         # e.g. 0.06 = match applies to first 6% of salary

annual_ira_contribution  = 3000  # direct IRA contribution
annual_ira_contribution_bucket = "roth"

rmd_trad_ira_share = 0.4
ss_start_age = 67

[person2.social_security_benefits]
"62" = 1100
"63" = 1180
"64" = 1270
"65" = 1370
"66" = 1480
"67" = 1600
"68" = 1730
"69" = 1860
"70" = 2010

# ═══════════════════════════════════════════════════════════════════════════════
# ─── Spending & Withdrawal Policy ──────────────────────────────────────────────
# ═══════════════════════════════════════════════════════════════════════════════

[spending]
retirement_annual = 82000            # annual household spending target (both alive, in today's dollars)
survivor_percent_of_retirement = 0.72  # survivor spending = 72% of retirement_annual
spending_basis = "real"              # "real" inflates spending annually | "nominal" keeps it flat

[withdrawal_policy]
# Cash reserve targets by phase — the model tries to keep this much cash on hand
# before investing surplus or drawing down retirement accounts.
accumulation_cash_target = 45000
retirement_cash_target   = 85000
survivor_cash_target     = 65000

# Withdrawal order when cash is below target (which buckets to sell first)
accumulation_withdrawal_order = ["cash_above_target", "taxable", "roth", "trad_ira", "cash_below_target"]
retirement_withdrawal_order   = ["cash_above_target", "trad_ira", "taxable", "roth", "cash_below_target"]
survivor_withdrawal_order     = ["cash_above_target", "trad_ira", "taxable", "roth", "cash_below_target"]

# Surplus reinvestment order when cash is above target (which buckets get the extra)
accumulation_surplus_order = ["taxable", "roth", "trad_ira"]
retirement_surplus_order   = ["taxable", "roth", "trad_ira"]
survivor_surplus_order     = ["taxable", "roth", "trad_ira"]

# ═══════════════════════════════════════════════════════════════════════════════
# ─── Market Assumptions ────────────────────────────────────────────────────────
# ═══════════════════════════════════════════════════════════════════════════════

[assumptions]
stock_return  = 0.07   # annual nominal return on equities
bond_return   = 0.04   # annual nominal return on bonds
inflation     = 0.03   # annual inflation rate
cash_return   = 0.03   # annual return on cash buckets (defaults to inflation if omitted)
real_estate_appreciation = 0.03   # annual home-value appreciation
equity_allocation       = 0.70   # fraction of investable portfolio in equities (rest in bonds)
real_estate_sale_fee_rate = 0.06 # fee deducted from gross sale proceeds

effective_tax_rate_pre_retirement  = 0.22  # legacy flat-tax fallback (see [taxes] for current model)
effective_tax_rate_post_retirement = 0.15  # legacy flat-tax fallback

# Account-mechanics defaults
taxable_withdrawal_taxable_fraction = 0.50   # 50% of taxable withdrawals are realized gains
trad_ira_withdrawal_taxable_fraction = 1.00  # 100% of traditional withdrawals are taxable
# initial_taxable_cost_basis_fraction = 0.50
# initial_roth_contribution_basis_fraction = 1.00

# ═══════════════════════════════════════════════════════════════════════════════
# ─── Tax Engine ────────────────────────────────────────────────────────────────
# ═══════════════════════════════════════════════════════════════════════════════

[taxes]
enabled = true
table_set = "2025_us_federal_oregon"   # shared tax table reference in config/tax_tables/
pre_retirement_filing_status = "married_joint"
retirement_filing_status     = "married_joint"
survivor_filing_status       = "single"
wage_tax_treatment = "net_cash"        # "net_cash" (current) | "taxable_wages" (future)

[taxes.rmd]
enabled    = true
start_age  = 73

# ═══════════════════════════════════════════════════════════════════════════════
# ─── Liabilities ───────────────────────────────────────────────────────────────
# ═══════════════════════════════════════════════════════════════════════════════

[[liabilities]]
name        = "Home Mortgage"
annual_rate = 0.0575
monthly_base  = 2163
monthly_extra = 200                 
type        = "mortgage"

[[liabilities]]
name          = "RAV4 Hybrid Auto Loan"
annual_rate   = 0.065
monthly_base  = 550
monthly_extra = 0
type          = "auto"

# ═══════════════════════════════════════════════════════════════════════════════
# ─── Events ────────────────────────────────────────────────────────────────────
# ═══════════════════════════════════════════════════════════════════════════════
#
# Each [[events]] block is one event. Set enabled = false to exclude it from
# the current run without deleting configuration.
#
# Event types and required fields:
# ┌─────────────────────┬──────────────────────────────────────────────────────┐
# │ EndOfPlan           │ person, year — zeroes income, triggers SS survivor   │
# │ Retire              │ person, year — permanent stop to wages (runtime)    │
# │ SocialSecurity      │ person, year, monthly_benefit                      │
# │ Expense             │ year, amount (negative), optional expense_kind/     │
# │                     │   repeat_every_years, chart_first_occurrence_only   │
# │ Income              │ year, amount (positive), optional end_year, taxable │
# │ BuyHome / SellHome  │ year + property/mortgage fields                    │
# │ NewJob / CareerBreak│ person, year/start_year/end_year, income fields    │
# │ Education           │ person, start_year, end_year, annual_cost          │
# │ SpendingShift       │ start_year, mode, optional end_year                │
# │ ContributionChange  │ year, person + contribution/employer override fields│
# │ Marriage            │ year (informational)                               │
# └─────────────────────┴──────────────────────────────────────────────────────┘
#
# Recurring controls: repeat_every_years, repeat_until_year, repeat_count
# Chart decluttering:   chart_first_occurrence_only = true (show only first label)

# ─── 1. Plan Boundary / Life Expectancy ────────────────────────────────────────

[[events]]
enabled = true
type    = "EndOfPlan"
label   = "End of Plan (Alex)"
person  = "person1"
year    = 2059                      # 1969 + 90

[[events]]
enabled = true
type    = "EndOfPlan"
label   = "End of Plan (Sam)"
person  = "person2"
year    = 2066                      # 1974 + 92

# ─── 2. Pre-Retirement / Near-Term Known Events ────────────────────────────────

# --- ContributionChange ---
# Override one or more per-person contribution amounts from a given year onward.
# Useful for restoring full 401(k) contributions after an early mortgage payoff,
# or stepping down contributions before a planned career break.
#
# Absolute fields (replace the current value):
#   annual_401k_contribution, annual_ira_contribution, annual_401k_employer_match
#
# Delta fields (add to the computed dollar amount, works in both flat and percent modes):
#   annual_401k_contribution_delta, annual_ira_contribution_delta,
#   annual_401k_employer_match_delta
#
# Percent-mode fields:
#   gross_income, gross_income_annual_increase_percent, retirement_contribution_percent,
#   retirement_contribution_annual_increase_percent, retirement_contribution_max_percent
#
# Employer-match percent-mode fields:
#   annual_401k_employer_match_mode, annual_401k_employer_match_rate,
#   annual_401k_employer_match_max_percent
#
# Example (commented — not active in this sample scenario):
# [[events]]
# enabled = true
# type    = "ContributionChange"
# label   = "401k step-up (mortgage paid off)"
# year    = 2033
# person  = "person1"
# annual_401k_contribution_delta = 12000   # redirect freed mortgage cash into 401(k)
# ──────────────────────────────────────────────────────────────────────────────

# ─── 3. Lifestyle Before and During Retirement ─────────────────────────────────

# Recurring travel (every other year, starting in 2027)
[[events]]
enabled = true
type    = "Expense"
label   = "Travel"
year    = 2027
amount  = -8000
expense_kind = "discretionary"
funding = "cash_reserve_first"
repeat_every_years = 2
repeat_until_year  = 2055
chart_first_occurrence_only = true

# Annual home maintenance reserve
[[events]]
enabled = true
type    = "Expense"
label   = "Home maintenance reserve"
year    = 2026
amount  = -3500
expense_kind = "mandatory"
funding = "cash_reserve_first"
repeat_every_years = 1
chart_first_occurrence_only = true

# One-time large home repairs
[[events]]
enabled = true
type    = "Expense"
label   = "HVAC replacement"
year    = 2034
amount  = -12000
expense_kind = "mandatory"
funding = "cash_reserve_first"

[[events]]
enabled = true
type    = "Expense"
label   = "Roof replacement"
year    = 2043
amount  = -18000
expense_kind = "mandatory"
funding = "cash_reserve_first"

# ─── 4. Vehicle Lifecycle ──────────────────────────────────────────────────────

[[events]]
enabled = true
type    = "Expense"
label   = "Vehicle purchase"
year    = 2032
amount  = -26000
expense_kind = "mandatory"
funding = "cash_reserve_first"

[[events]]
enabled = true
type    = "Expense"
label   = "Vehicle replacement"
year    = 2044
amount  = -30000
expense_kind = "mandatory"
funding = "cash_reserve_first"

# ─── 5. Income Events ─────────────────────────────────────────────────────────

# Bounded side income during early retirement
[[events]]
enabled = true
type    = "Income"
label   = "Part-time consulting"
year    = 2038
amount  = 18000
end_year = 2042
taxable  = true

# ─── 6. Later-Life Care ────────────────────────────────────────────────────────

[[events]]
enabled = true
type    = "Expense"
label   = "Care support"
year    = 2053
amount  = -25000
expense_kind = "mandatory"
repeat_every_years = 1
chart_first_occurrence_only = true
