# ─── Liabilities ──────────────────────────────────────────────────────────────
# Each liability is amortized year-by-year in the model.
# current_balance is pulled live from Monarch by matching the account name.
# The freed monthly payment is added back to cash flow from the payoff year onward.
# type = "mortgage" means payoff is also reflected in home equity tracking.

[[liabilities]]
name          = "Mortgage (5156)"       # must match Monarch account name exactly
annual_rate   = 0.035
monthly_base  = 1675.53                 # contractual P&I payment
monthly_extra = 1000.00                 # voluntary extra principal payment
type          = "mortgage"

[[liabilities]]
name          = "2020 Honda CR-V (9628)"
annual_rate   = 0.06
monthly_base  = 298.00
monthly_extra = 0.00
type          = "auto"


# ─── Financial Events ─────────────────────────────────────────────────────────
# Each [[events]] block is one event. Set enabled = false to exclude it from
# the projection without deleting it.
#
# Required fields for all events:
#   enabled  — true/false
#   type     — see list below
#   label    — human-readable name shown on chart
#
# Optional recurrence/display fields for any event with `year` or `start_year`:
#   repeat_every_years          — recurrence interval in years
#   repeat_until_year           — last anchor year to include
#   repeat_count                — total number of occurrences including the first
#   chart_first_occurrence_only — if true, repeated events still affect the model
#                                 every time but only the first occurrence is
#                                 annotated on the main projection chart
#
# Event types and their additional required fields:
#
#   Retire          person, year
#   SocialSecurity  person, year, monthly_benefit [, taxable=false] [, taxable_fraction=0.85]
#   Expense         year, amount [, expense_kind="mandatory"]  # or "discretionary"
#   Income          year, amount [, end_year] [, taxable=false] [, taxable_fraction=0.50]
#   BuyHome         year, price, down_payment, mortgage_rate, term_years
#   SellHome        year, property [, liability_names=[...]] [, sale_fee_rate=0.06] [, reinvest_to="taxable"] [, reinvest_fraction=1.0]
#   NewJob          person, year, annual_income
#   CareerBreak     person, start_year, end_year
#   Education       person, start_year, end_year, annual_cost
#   Marriage        year
# ──────────────────────────────────────────────────────────────────────────────

