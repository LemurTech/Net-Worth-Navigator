# Net Worth Navigator — Configuration
# Edit this file to change assumptions, then run: python run.py
# All monetary values are in today's USD unless noted.
# Events can be toggled on/off with enabled = true/false without deleting them.

[simulation]
start_year = 2026
end_year   = 2066   # max(matthew life expectancy: 2057, weny life expectancy: 2066)

[display]
projection_title = "Casa Lemuria"


# ─── Household Members ────────────────────────────────────────────────────────

[matthew]
name              = "Person 1"
dob               = "1967-04-23"
life_expectancy   = 90              # → year 2057
retirement_year   = 2037
annual_take_home  = 74958           # current net (after tax) income

# Social Security
# Social Security benefit options (from SSA.gov estimate):
#   Age 62 → $1,553/mo  |  Age 65 → $2,164/mo
#   Age 67 → $2,691/mo  |  Age 70 → $3,698/mo
ss_monthly_benefit = 3698           # monthly benefit at the chosen start age
ss_start_age       = 70             # source of truth for SS start timing

# Retirement contributions (2025 actuals)
annual_401k_contribution = 12225    # 401k + Roth combined
annual_ira_contribution  = 0

[weny]
name              = "Person 2"
dob               = "1976-10-02"
life_expectancy   = 90              # → year 2066
retirement_year   = 2037
annual_take_home  = 28512           # current net (after tax) income

# Social Security
# TODO: Confirm with SSA.gov when estimate is available
ss_monthly_benefit = 1000           # monthly benefit at the chosen start age
ss_start_age       = 67             # source of truth for SS start timing

# Retirement contributions (2025 actuals)
annual_401k_contribution = 0
annual_ira_contribution  = 3600     # Roth IRA


# ─── Spending ─────────────────────────────────────────────────────────────────

[spending]
# Target annual household spending in retirement (today's dollars)
# TODO: Confirm this figure — current take-home combined is $103,470
retirement_annual = 100000          # slightly above current ~$87,645 spending
survivor_annual   = 70000           # ~70% of retirement_annual — single-person household

# Pre-retirement spending is implied by income minus contributions
# Optionally override here if you want to model explicit savings rate
# annual_savings_override = 0


# ─── Withdrawal Policy ─────────────────────────────────────────────────────────

[withdrawal_policy]
# Cash reserve targets by phase.
# - accumulation: roughly today's earmarked liquid pool from live balances
# - retirement:   roughly one year of planned retirement spending
# - survivor:     roughly one year of planned survivor spending
accumulation_cash_target = 64000
retirement_cash_target   = 100000
survivor_cash_target     = 70000

# Deficit coverage order.
# cash_above_target uses only dollars above the reserve.
# cash_below_target taps the reserve itself only as a last resort.
accumulation_withdrawal_order = ["cash_above_target", "taxable", "roth", "trad_ira", "cash_below_target"]
retirement_withdrawal_order   = ["cash_above_target", "taxable", "roth", "trad_ira", "cash_below_target"]
survivor_withdrawal_order     = ["cash_above_target", "taxable", "roth", "trad_ira", "cash_below_target"]


# ─── Market & Economic Assumptions ───────────────────────────────────────────

[assumptions]
stock_return     = 0.07     # nominal annual return, equities
bond_return      = 0.04     # nominal annual return, fixed income
inflation        = 0.03     # annual CPI inflation rate
real_estate_appreciation = 0.03   # annual home/property appreciation; separate from CPI if desired
equity_allocation = 0.70    # portfolio stock/bond split (0.70 = 70% equities)
real_estate_sale_fee_rate = 0.06   # default broker/closing-cost rate for SellHome events

# Legacy fallback rates used only if `[taxes]` is disabled or incomplete.
# Current deeper-tax-realism path uses the bracket tables below.
effective_tax_rate_pre_retirement  = 0.22
effective_tax_rate_post_retirement = 0.15

# Withdrawal taxability (simplified — first-pass sequencing model)
taxable_withdrawal_taxable_fraction = 0.50   # rough basis/gains proxy for taxable brokerage withdrawals
trad_ira_withdrawal_taxable_fraction = 1.00  # pre-tax retirement accounts taxed in full on withdrawal

[taxes]
enabled = true
table_set = "2025_us_federal_oregon"
pre_retirement_filing_status = "married_joint"
retirement_filing_status     = "married_joint"
survivor_filing_status       = "single"
# Shared reference data loads from config/tax_tables/<table_set>.toml.


# ─── Account Classification ───────────────────────────────────────────────────
# Maps Monarch account names to model categories.
# Run `python src/monarch_bridge.py --list` to see all account names.
# TODO: Populate after first Monarch query.

[accounts]
# Categories: taxable, trad_ira, roth, cash, real_estate, vehicle, liability, ignore
# "ignore" = excluded entirely (credit cards, zero-balance, redundant trackers)
# "liability" = negative balance accounts that reduce net worth (loans, mortgage)
#
# To temporarily exclude any account from the model without removing its
# classification, add its exact Monarch name to the disabled list below.
# The category entry stays in place — just toggle the name in/out of this list.
disabled = [
    # Vehicles — depreciate to zero; not useful in forward projection
    "2020 Honda CR-V EX-L",
    "2012 Scion xD",
    "2008 Honda VT750 Shadow Aero",
    "1997 Lexus ES 300",
    "2020 Honda CR-V (9628)",        # vehicle loan — excluded with vehicle asset

    # Personal operating accounts — not part of the financial plan
    "CO: Checking Person 1 (0690)",
    "CO: Savings Person 1 (1398)",
    "CO: Checking Person 2 (4312)",
    "RO: Person 1 Savings (6500)",
    "RO: Person 1 Ownership (6587)",
    "RO: Person 1 Checking (8809)",

    # Primary home
    # "Casa Lemuria Off",
]

