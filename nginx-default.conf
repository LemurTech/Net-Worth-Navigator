# ── Net Worth Navigator · Sample nginx Config ───────────────────────────────
# Used with docker-compose.yml. Serves static output files from /usr/share/nginx/html
# and proxies the Setup Panel to the config-editor container.
#
# Adjust the proxy paths if your admin_app.py listens on a different port.

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the config editor
    location /api/ {
        proxy_pass http://nwn-config-editor:8010/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300;
    }

    # Proxy the Setup Panel
    location /setup {
        proxy_pass http://nwn-config-editor:8010/setup;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300;
    }

    # Static output files — never cache (they change on each render)
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri $uri/ =404;
    }
}
